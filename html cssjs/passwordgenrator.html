<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Orbitron', sans-serif;
      background:radial-gradient(circle at top,#0f2027,#000);
      color:#e5f9ff;
    }
    .card{
      width:380px;
      background:rgba(0,0,0,.65);
      backdrop-filter:blur(10px);
      border-radius:20px;
      padding:24px;
      box-shadow:0 0 30px rgba(0,255,255,.25);
    }
    h1{
      text-align:center;
      margin:0 0 18px;
      color:#00fff0;
      letter-spacing:1px;
    }
    .output{
      display:flex;
      gap:8px;
      margin-bottom:16px;
    }
    .output input{
      flex:1;
      padding:12px;
      border-radius:12px;
      border:none;
      outline:none;
      font-size:14px;
      background:#0b1c22;
      color:#00fff0;
    }
    .output button{
      border:none;
      border-radius:12px;
      padding:0 14px;
      background:#00fff0;
      color:#002b2f;
      cursor:pointer;
      font-weight:600;
    }
    .settings label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin:10px 0;
      font-size:13px;
    }
    .settings input[type=range]{width:100%}
    .generate{
      width:100%;
      margin-top:18px;
      padding:14px;
      border:none;
      border-radius:14px;
      font-size:15px;
      font-weight:600;
      background:linear-gradient(135deg,#00fff0,#0077ff);
      color:#001e22;
      cursor:pointer;
      box-shadow:0 0 18px rgba(0,255,255,.4);
    }
    .strength{
      margin-top:12px;
      font-size:12px;
      text-align:center;
      color:#9ffcff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Password Generator</h1>

    <div class="output">
      <input type="text" id="password" readonly placeholder="Click Generate" />
      <button onclick="copyPass()">Copy</button>
    </div>

    <div class="settings">
      <label>Password Length: <span id="lenVal">12</span></label>
      <input type="range" min="6" max="32" value="12" id="length" />

      <label>Uppercase <input type="checkbox" id="upper" checked></label>
      <label>Lowercase <input type="checkbox" id="lower" checked></label>
      <label>Numbers <input type="checkbox" id="number" checked></label>
      <label>Symbols <input type="checkbox" id="symbol"></label>
    </div>

    <button class="generate" onclick="generate()">Generate Password</button>
    <div class="strength" id="strength">Strength: —</div>
  </div>

  <script>
    const lengthEl = document.getElementById('length');
    const lenVal = document.getElementById('lenVal');
    lengthEl.oninput = () => lenVal.textContent = lengthEl.value;

    function generate(){
      const len = +lengthEl.value;
      const upper = document.getElementById('upper').checked;
      const lower = document.getElementById('lower').checked;
      const number = document.getElementById('number').checked;
      const symbol = document.getElementById('symbol').checked;

      let chars = '';
      if(upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if(lower) chars += 'abcdefghijklmnopqrstuvwxyz';
      if(number) chars += '0123456789';
      if(symbol) chars += '!@#$%^&*()_+{}[]<>?';

      if(!chars){
        alert('Select at least one option');
        return;
      }

      let pass='';
      for(let i=0;i<len;i++){
        pass += chars[Math.floor(Math.random()*chars.length)];
      }
      document.getElementById('password').value = pass;
      updateStrength(len, chars.length);
    }

    function copyPass(){
      const input = document.getElementById('password');
      if(!input.value) return;
      input.select();
      document.execCommand('copy');
      alert('Password Copied');
    }

    function updateStrength(len, pool){
      const strength = document.getElementById('strength');
      if(len < 8) strength.textContent = 'Strength: Weak';
      else if(len < 14) strength.textContent = 'Strength: Medium';
      else strength.textContent = 'Strength: Strong';
    }
  </script>
</body>
</html>
